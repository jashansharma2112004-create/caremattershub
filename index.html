    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){window.dataLayer.push(arguments);} // eslint-disable-line no-unused-vars
      window.gtag = window.gtag || gtag;

      (function () {
        // Vite replaces these placeholders at build time
        var gaId = "%VITE_GA4_MEASUREMENT_ID%";
        var mode = "%MODE%";

        // Run GA only in production builds
        if (mode !== "production") return;
        if (!gaId || gaId.indexOf("G-") !== 0) return;

        window.gtag("js", new Date());

        // Fire the initial page_view automatically (avoid admin routes)
        var isAdminRoute =
          window.location &&
          window.location.pathname &&
          window.location.pathname.indexOf("/admin") === 0;

        window.gtag("config", gaId, {
          anonymize_ip: true,
          cookie_flags: "SameSite=None;Secure",
          send_page_view: !isAdminRoute,
        });

        // Used by SPA route tracking to avoid double-firing the initial page_view
        window.__GA4_INITIAL_PAGEVIEW__ = !isAdminRoute;
      })();
    </script>
